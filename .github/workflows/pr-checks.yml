name: PR Checks

on:
  push:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6
        with:
          python-version: "3.14" # Using Python version specified in pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run mypy
        run: |
          make mypy
      - name: Run tests
        run: |
          make test

  create-rc:
    name: Bump Version
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0

      - name: Find PR number
        id: pr
        uses: jwalton/gh-find-current-pr@89ee5799558265a1e0e31fab792ebb4ee91c016b
        with:
          state: open

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6
        with:
          python-version: "3.14"

      - name: prepare ci dependencies
        id: bump
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ci]"
          pip install -e "."
          make bump-rc
          NEW_VERSION=$(toml get --toml-path pyproject.toml project.version)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Build binary wheel and source tarball
        run: |
          pip install build twine
          pip install -e ".[ci]"
          make upload
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: commit bumped version
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Bump version to ${{ steps.bump.outputs.version }}"
          tag_name: 'v${{steps.bump.outputs.version}}'
          file_pattern: pyproject.toml

      - name: Comment on PR with new version
        if: steps.pr.outputs.number != ''
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            RC version: `${{ steps.bump.outputs.version }}` 🚀
          comment_tag: new-version
          pr_number: ${{ steps.pr.outputs.number }}

